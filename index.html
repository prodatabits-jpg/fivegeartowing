<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Five Gear Towing</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

<header class="header">
<div class="container nav">
<div class="logo">
<img src="logo.png" alt="Logo">
<div>
<h2>FIVE GEAR TOWING</h2>
<p>Trusted Since 2008</p>
</div>
</div>
<nav>
<a href="#services">Services</a>
<a href="#gallery">Gallery</a>
<a href="#contact">Contact</a>
</nav>
<a class="call-btn" href="tel:+919820974877">Call Now</a>
</div>
</header>

<section class="hero">
<div class="overlay">
<div class="hero-content">
<h1>Pan India Vehicle Transportation</h1>
<p>Cars • Bikes • Household Goods</p>
<div class="hero-buttons">
<a class="btn" href="tel:+919820974877">Call</a>
<a class="btn whatsapp" href="https://wa.me/919820974877">WhatsApp</a>
</div>
</div>
</div>
</section>

<section id="services" class="section">
<h2>Services</h2>
<div class="cards">
<div class="card">Car Transport</div>
<div class="card">Bike Transport</div>
<div class="card">Luxury Carrier</div>
<div class="card">Household Goods</div>
</div>
</section>

<section id="gallery" class="section light">
<h2>Gallery</h2>
<div class="slider">
<button id="prev">&#10094;</button>
<div class="slides">
<img src="img1.jpg"><img src="img2.jpg"><img src="img3.jpg"><img src="img4.jpg"><img src="img5.jpg">
<img src="img6.jpg"><img src="img7.jpg"><img src="img8.jpg"><img src="img9.jpg"><img src="img10.jpg">
</div>
<button id="next">&#10095;</button>
</div>
</section>

<section id="contact" class="section">
<h2>Contact</h2>
<form class="quote">
<input placeholder="Name">
<input placeholder="Phone">
<input placeholder="Pickup City">
<input placeholder="Drop City">
<textarea placeholder="Message"></textarea>
<button>Request Quote</button>
</form>
</section>

<footer>© Five Gear Towing</footer>
<script src="script.js"></script>
</body>
</html>
